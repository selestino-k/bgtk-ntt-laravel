---
deployment:
  tasks:
    - export DEPLOYPATH=/home/vllwdwqk/public_html

    # Create .env from example if it doesn't exist yet
    - '[ -f .env ] || cp .env.example .env'

    # Generate app key only if not already set
    - grep -q "^APP_KEY=base64:" .env || /usr/local/bin/php artisan key:generate --force

    # Create SQLite database file if it doesn't exist
    - '[ -f database/database.sqlite ] || touch database/database.sqlite'

    # Ensure storage directories exist and are writable
    - mkdir -p storage/framework/{sessions,views,cache} storage/logs
    - chmod -R 775 storage bootstrap/cache

    # Run database migrations
    - /usr/local/bin/php artisan migrate --force

    # Create public storage symlink
    - /usr/local/bin/php artisan storage:link --force

    # Cache config, routes, and views for production
    - /usr/local/bin/php artisan config:cache
    - /usr/local/bin/php artisan route:cache
    - /usr/local/bin/php artisan view:cache

    # Copy public/ files to public_html
    - /bin/cp -R public/. $DEPLOYPATH
